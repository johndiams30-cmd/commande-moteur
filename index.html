<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔧 PROJET IoT - Commande Moteur</title>
    <link href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" rel="preload" as="script">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Thème clair */
        body.light-theme {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        body.light-theme .container {
            background: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        body.light-theme .status-card {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
        }

        body.light-theme .history-item {
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        /* Thème sombre */
        body.dark-theme {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
        }

        body.dark-theme .container {
            background: #1e1e2f;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        body.dark-theme .status-card {
            background: #2a2a3a;
            border: 1px solid #3a3a4a;
        }

        body.dark-theme .history-item {
            background: #2a2a3a;
            border-bottom: 1px solid #3a3a4a;
        }

        .container {
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* Login Container */
        .login-container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body.dark-theme .login-box {
            background: rgba(30, 30, 47, 0.95);
        }

        body.light-theme .login-box {
            background: white;
        }

        .login-box h2 {
            margin-bottom: 30px;
            font-size: 28px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ffaa00;
            border-radius: 10px;
            font-size: 16px;
            background: transparent;
            color: inherit;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: #ffaa00;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-box button:hover {
            transform: scale(1.02);
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 14px;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .theme-btn,
        .logout-btn {
            background: transparent;
            border: 2px solid #ffaa00;
            border-radius: 10px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            color: inherit;
        }

        .theme-btn:hover,
        .logout-btn:hover {
            background: #ffaa00;
            color: #333;
            transform: scale(1.05);
        }

        .status-card {
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .led-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .led {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .led-on {
            background: radial-gradient(circle at 30% 30%, #ffaa00, #ff6600);
            box-shadow: 0 0 20px #ffaa00;
        }

        .led-off {
            background: radial-gradient(circle at 30% 30%, #666, #333);
            box-shadow: none;
        }

        .control-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
        }

        .btn-on {
            background: #00b09b;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 176, 155, 0.3);
        }

        .btn-off {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .info-item {
            text-align: center;
            padding: 10px;
            background: rgba(255, 170, 0, 0.1);
            border-radius: 10px;
        }

        .info-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .info-value {
            font-size: 16px;
            font-weight: bold;
            margin-top: 5px;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-section h3 {
            margin-bottom: 15px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .history-command {
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 5px;
        }

        .history-command.on {
            color: #00b09b;
        }

        .history-command.off {
            color: #ff6b6b;
        }

        .chart-container {
            margin: 20px 0;
            height: 200px;
        }

        .connection-status {
            text-align: center;
            font-size: 12px;
            margin-top: 15px;
            padding: 5px;
            border-radius: 5px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffaa00;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Login Container -->
    <div class="container login-container" id="loginContainer">
        <div class="login-box">
            <h2>🔐 Accès sécurisé</h2>
            <input type="password" id="passwordInput" placeholder="Entrez le mot de passe" autocomplete="off">
            <button onclick="auth.login()">Se connecter</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="container dashboard" id="dashboard">
        <h1>
            🔧 PROJET IoT
            <div class="header-buttons">
                <button class="theme-btn" id="themeToggle">
                    <span class="theme-icon">☀️</span>
                    <span class="theme-text">Mode clair</span>
                </button>
                <button class="logout-btn" onclick="auth.logout()">🚪 Déconnexion</button>
            </div>
        </h1>

        <div class="status-card">
            <h3>État du Moteur</h3>
            <div class="led-container">
                <div class="led" id="led"></div>
                <span id="ledStatus" style="font-size: 18px; font-weight: bold;">---</span>
            </div>
        </div>

        <div class="control-buttons">
            <button class="btn btn-on" id="btnOn" onclick="sendCommand(1)">🟢 MARCHE</button>
            <button class="btn btn-off" id="btnOff" onclick="sendCommand(0)">🔴 ARRÊT</button>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Dernière commande</div>
                <div class="info-value" id="lastCommand">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">Dernière mise à jour</div>
                <div class="info-value" id="lastUpdate">-</div>
            </div>
            <div class="info-item">
                <div class="info-label">Statut connexion</div>
                <div class="info-value" id="connectionStatus">OK</div>
            </div>
            <div class="info-item">
                <div class="info-label">Rafraîchissement</div>
                <div class="info-value" id="refreshTime">-</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="commandChart"></canvas>
        </div>

        <div class="history-section">
            <h3>📜 Historique des commandes</h3>
            <div class="history-list" id="historyList">
                <div style="text-align: center; padding: 20px;">Aucune commande</div>
            </div>
        </div>

        <div class="connection-status">
            🔌 Connecté à ThingSpeak
        </div>
    </div>

    <script>
        // ==================== AUTHENTIFICATION ====================
        // 🔐 Mot de passe : Admin1234
        // Hash SHA-256 généré le 28/03/2026
        const AUTH_CONFIG = {
            passwordHash: "c7ad44cbad762a5da0a452f9e854fdc1e0e7a52a38015f23f3eab1d80b931dd2"
        };

        class AuthManager {
            constructor() {
                this.checkSession();
            }

            async hashPassword(password) {
                const hashBuffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(password));
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async login() {
                const passwordInput = document.getElementById('passwordInput');
                const errorDiv = document.getElementById('loginError');
                const password = passwordInput.value;

                if (!password) {
                    errorDiv.textContent = 'Veuillez entrer un mot de passe';
                    return;
                }

                const hash = await this.hashPassword(password);

                if (hash === AUTH_CONFIG.passwordHash) {
                    // Authentification réussie
                    sessionStorage.setItem('iot_auth', 'true');
                    sessionStorage.setItem('iot_auth_time', Date.now().toString());
                    this.showDashboard();
                    errorDiv.textContent = '';
                    passwordInput.value = '';
                } else {
                    errorDiv.textContent = 'Mot de passe incorrect';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }

            checkSession() {
                const auth = sessionStorage.getItem('iot_auth');
                const authTime = sessionStorage.getItem('iot_auth_time');

                if (auth === 'true' && authTime) {
                    const timeDiff = Date.now() - parseInt(authTime);
                    // Session expire après 24 heures
                    if (timeDiff < 24 * 60 * 60 * 1000) {
                        this.showDashboard();
                        return;
                    }
                }
                this.showLogin();
            }

            showDashboard() {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                // Initialiser l'application après authentification
                if (typeof initializeApp === 'function') {
                    initializeApp();
                }
            }

            showLogin() {
                document.getElementById('loginContainer').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
                sessionStorage.removeItem('iot_auth');
                sessionStorage.removeItem('iot_auth_time');
            }

            logout() {
                sessionStorage.removeItem('iot_auth');
                sessionStorage.removeItem('iot_auth_time');
                this.showLogin();
                // Réinitialiser l'état
                if (typeof resetApp === 'function') {
                    resetApp();
                }
            }
        }

        // ==================== APPLICATION PRINCIPALE ====================

        // === CONFIGURATION ===
        const CONFIG = {
            channelId: '3295988',
            writeApiKey: '10JCZMPJ1E41POZS',
            readApiKey: 'QJVJO9L6RIRUKS1U',
            refreshInterval: 15000,
            maxHistoryItems: 20
        };

        // === ÉTAT DE L'APPLICATION ===
        let currentLedState = 0;
        let commandHistory = [];
        let lastUpdateTime = null;
        let chart = null;
        let refreshInterval = null;

        // === GESTION DU THÈME ===
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');
            const themeIcon = themeBtn.querySelector('.theme-icon');
            const themeText = themeBtn.querySelector('.theme-text');

            if (body.classList.contains('dark-theme')) {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Mode sombre';

                if (chart) {
                    chart.options.scales.y.grid.color = 'rgba(0,0,0,0.1)';
                    chart.options.scales.y.ticks.color = '#333';
                    chart.options.scales.x.grid.color = 'rgba(0,0,0,0.1)';
                    chart.options.scales.x.ticks.color = '#333';
                    chart.update();
                }

                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Mode clair';

                if (chart) {
                    chart.options.scales.y.grid.color = 'rgba(255,255,255,0.1)';
                    chart.options.scales.y.ticks.color = '#e0e0e0';
                    chart.options.scales.x.grid.color = 'rgba(255,255,255,0.1)';
                    chart.options.scales.x.ticks.color = '#e0e0e0';
                    chart.update();
                }

                localStorage.setItem('theme', 'dark');
            }
        }

        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('theme');
            const body = document.body;
            const themeBtn = document.getElementById('themeToggle');

            if (themeBtn) {
                const themeIcon = themeBtn.querySelector('.theme-icon');
                const themeText = themeBtn.querySelector('.theme-text');

                if (savedTheme === 'light') {
                    body.classList.add('light-theme');
                    body.classList.remove('dark-theme');
                    themeIcon.textContent = '🌙';
                    themeText.textContent = 'Mode sombre';
                } else {
                    body.classList.add('dark-theme');
                    body.classList.remove('light-theme');
                    themeIcon.textContent = '☀️';
                    themeText.textContent = 'Mode clair';
                }
            }
        }

        // === CHART.JS INITIALIZATION ===
        function initializeChart() {
            const ctx = document.getElementById('commandChart').getContext('2d');
            const isDarkTheme = document.body.classList.contains('dark-theme');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'État du Moteur',
                        data: [],
                        borderColor: '#ffaa00',
                        backgroundColor: isDarkTheme ? 'rgba(255, 170, 0, 0.2)' : 'rgba(255, 170, 0, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 1,
                            grid: {
                                color: isDarkTheme ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                            },
                            ticks: {
                                stepSize: 1,
                                color: isDarkTheme ? '#e0e0e0' : '#333',
                                callback: function (value) {
                                    return value === 1 ? 'MARCHE' : 'ARRÊT';
                                }
                            }
                        },
                        x: {
                            grid: {
                                color: isDarkTheme ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                            },
                            ticks: {
                                color: isDarkTheme ? '#e0e0e0' : '#333'
                            }
                        }
                    }
                }
            });
        }

        // === CHARGEMENT DE L'ÉTAT INITIAL ===
        async function loadInitialState() {
            await readLEDState();
            updateHistoryDisplay();
        }

        // === RAFRAÎCHISSEMENT AUTOMATIQUE ===
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(async () => {
                await readLEDState();
                document.getElementById('refreshTime').textContent =
                    new Date().toLocaleTimeString('fr-FR');
            }, CONFIG.refreshInterval);
        }

        // === ÉCOUTEURS D'ÉVÉNEMENTS ===
        function setupEventListeners() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.addEventListener('mousedown', () => {
                    btn.style.transform = 'scale(0.95)';
                });
                btn.addEventListener('mouseup', () => {
                    btn.style.transform = '';
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.transform = '';
                });
            });
        }

        // === ENVOI D'UNE COMMANDE ===
        async function sendCommand(value) {
            setButtonsDisabled(true);

            document.getElementById('lastCommand').textContent =
                value === 1 ? 'MARCHE' : 'ARRÊT';
            document.getElementById('lastUpdate').textContent =
                new Date().toLocaleTimeString('fr-FR');

            showLoading(true);

            try {
                const url = `https://api.thingspeak.com/update?api_key=${CONFIG.writeApiKey}&field1=${value}`;
                const response = await fetch(url);
                const result = await response.text();

                if (response.ok && result !== '0') {
                    console.log('Commande envoyée avec succès:', value);
                    addToHistory(value);
                    updateLEDState(value);

                    setTimeout(async () => {
                        await readLEDState();
                    }, 5000);

                    showNotification('Commande envoyée avec succès !', 'success');
                } else {
                    throw new Error('Échec de l\'envoi');
                }
            } catch (error) {
                console.error('Erreur:', error);
                showNotification('Erreur de communication avec ThingSpeak', 'error');
                document.getElementById('connectionStatus').textContent = 'ERREUR';
            } finally {
                showLoading(false);
                setTimeout(() => {
                    setButtonsDisabled(false);
                    document.getElementById('connectionStatus').textContent = 'OK';
                }, 15000);
            }
        }

        // === LECTURE DE L'ÉTAT ===
        async function readLEDState() {
            try {
                const url = `https://api.thingspeak.com/channels/${CONFIG.channelId}/fields/1/last.json?api_key=${CONFIG.readApiKey}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.field1 !== undefined) {
                    const value = parseInt(data.field1);
                    updateLEDState(value);
                    addToHistory(value, true);
                    document.getElementById('connectionStatus').textContent = 'OK';
                }
            } catch (error) {
                console.error('Erreur de lecture:', error);
                document.getElementById('connectionStatus').textContent = 'ERREUR';
            }
        }

        // === MISE À JOUR DE L'UI ===
        function updateLEDState(value) {
            const led = document.getElementById('led');
            const ledStatus = document.getElementById('ledStatus');

            if (value === 1) {
                led.className = 'led led-on';
                ledStatus.textContent = 'MARCHE';
                currentLedState = 1;
            } else {
                led.className = 'led led-off';
                ledStatus.textContent = 'ARRÊT';
                currentLedState = 0;
            }

            updateChart();
        }

        // === AJOUT À L'HISTORIQUE ===
        function addToHistory(value, fromRead = false) {
            const timestamp = new Date();
            const historyItem = {
                value: value,
                time: timestamp,
                source: fromRead ? 'lecture' : 'commande'
            };

            commandHistory.unshift(historyItem);

            if (commandHistory.length > CONFIG.maxHistoryItems) {
                commandHistory.pop();
            }

            updateHistoryDisplay();
        }

        // === MISE À JOUR DE L'AFFICHAGE HISTORIQUE ===
        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            if (commandHistory.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; padding: 20px;">Aucune commande</div>';
                return;
            }

            commandHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';

                const commandSpan = document.createElement('span');
                commandSpan.className = `history-command ${item.value === 1 ? 'on' : 'off'}`;
                commandSpan.textContent = item.value === 1 ? 'MARCHE' : 'ARRÊT';

                const timeSpan = document.createElement('span');
                timeSpan.className = 'history-time';
                timeSpan.textContent = item.time.toLocaleTimeString('fr-FR');

                div.appendChild(commandSpan);
                div.appendChild(timeSpan);
                historyList.appendChild(div);
            });
        }

        // === MISE À JOUR DU GRAPHIQUE ===
        function updateChart() {
            if (!chart) return;

            const now = new Date();
            chart.data.labels.push(now.toLocaleTimeString('fr-FR'));
            chart.data.datasets[0].data.push(currentLedState);

            if (chart.data.labels.length > 20) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            chart.update();
        }

        // === UTILITAIRES UI ===
        function setButtonsDisabled(disabled) {
            const btnOn = document.getElementById('btnOn');
            const btnOff = document.getElementById('btnOff');
            if (btnOn) btnOn.disabled = disabled;
            if (btnOff) btnOff.disabled = disabled;
        }

        function showLoading(show) {
            const status = document.getElementById('connectionStatus');
            if (show && status) {
                status.innerHTML = '<span class="loading"></span>';
            } else if (status) {
                status.textContent = 'OK';
            }
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? '#00b09b' : '#ff6b6b'};
                color: white;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }

        // === INITIALISATION COMPLÈTE ===
        function initializeApp() {
            loadSavedTheme();
            initializeChart();
            loadInitialState();
            startAutoRefresh();
            setupEventListeners();

            const themeBtn = document.getElementById('themeToggle');
            if (themeBtn) {
                themeBtn.removeEventListener('click', toggleTheme);
                themeBtn.addEventListener('click', toggleTheme);
            }
        }

        function resetApp() {
            if (refreshInterval) clearInterval(refreshInterval);
            commandHistory = [];
            currentLedState = 0;
            if (chart) {
                chart.data.labels = [];
                chart.data.datasets[0].data = [];
                chart.update();
            }
            updateHistoryDisplay();
        }

        // === EXPOSITION DES FONCTIONS GLOBALES ===
        window.sendCommand = sendCommand;

        const auth = new AuthManager();
