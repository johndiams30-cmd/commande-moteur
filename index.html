<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE MOTEUR</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- En-tête -->
        <header>
            <h1>🔧 Contrôle de l'ESP32</h1>
            <p class="subtitle">Interface de commande pour LED via ThingSpeak</p>
        </header>

        <!-- Carte principale -->
        <main>
            <div class="card">
                <div class="led-container">
                    <h2>État de la LED</h2>
                    <div class="led-display">
                        <div class="led-ring">
                            <div class="led led-off" id="led"></div>
                        </div>
                        <span class="led-status" id="ledStatus">ÉTEINTE</span>
                    </div>
                </div>

                <div class="controls">
                    <h2>Commandes</h2>
                    <div class="button-group">
                        <button class="btn btn-on" id="btnOn" onclick="sendCommand(1)">
                            <span class="btn-icon">🔛</span>
                            <span class="btn-text">ALLUMER</span>
                        </button>
                        <button class="btn btn-off" id="btnOff" onclick="sendCommand(0)">
                            <span class="btn-icon">🔒</span>
                            <span class="btn-text">ÉTEINDRE</span>
                        </button>
                    </div>
                </div>

                <!-- Informations en temps réel -->
                <div class="info-panel">
                    <div class="info-item">
                        <span class="info-label">Dernière commande :</span>
                        <span class="info-value" id="lastCommand">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Dernière mise à jour :</span>
                        <span class="info-value" id="lastUpdate">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Statut connexion :</span>
                        <span class="info-value" id="connectionStatus">OK</span>
                    </div>
                </div>
            </div>

            <!-- Section historique (optionnelle) -->
            <div class="card history-card">
                <h2>📊 Historique des commandes</h2>
                <div class="chart-container">
                    <canvas id="commandChart"></canvas>
                </div>
                <div class="history-list" id="historyList">
                    <!-- L'historique sera ajouté ici par JavaScript -->
                </div>
            </div>
        </main>

        <!-- Pied de page -->
        <footer>
            <p>Connecté à ThingSpeak - Channel ID: 3295962</p>
            <p class="small">Dernière lecture: <span id="refreshTime">-</span></p>
        </footer>
    </div>

    <!-- Bibliothèques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
