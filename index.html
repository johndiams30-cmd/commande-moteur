<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet IoT CFAO 2025</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- MENU PRINCIPAL -->

    <div id="menuPrincipal" class="page">

        <h1>Projet IoT CFAO 2025</h1>
        <h3>Contrôle d'éclairage intelligent</h3>

        <p class="description">
            Ce projet vise à développer un système de contrôle d'éclairage intelligent basé sur l'IoT.
        </p>

        <div class="card">

            <p><b>Piloté par :</b></p>
            <h2>MASTERSLAVE LABORATOIRE</h2>

            <p><b>Assisté par :</b></p>

            <p>Ir DIAMONEKA VAKANDA</p>


        </div>

        <button class="btn-main" onclick="ouvrirControle()">
            Voir le panneau de contrôle
        </button>

    </div>


    <!-- PANNEAU DE CONTROLE -->

    <div id="panneauControle" class="page hidden">

        <h1>Supervision Lampe</h1>

        <p id="connexion">✅ Connecté</p>

        <div id="ampoule" class="ampoule off"></div>

        <h2>État : <span id="etat">Éteinte</span></h2>

        <button class="btn-on" onclick="allumer()">Allumer</button>

        <button class="btn-off" onclick="eteindre()">Éteindre</button>

        <button class="btn-retour" onclick="retourMenu()">
            ⬅ Retour au menu principal
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
