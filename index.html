<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔧 PROJET IoT - Commande Moteur</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2>🔐 Accès sécurisé</h2>
            <input type="password" id="passwordInput" placeholder="Entrez le mot de passe" autocomplete="off">
            <button id="loginBtn">Se connecter</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="container">
            <div class="header-top">
                <h1>🔧 PROJET IoT</h1>
                <div class="header-buttons">
                    <button class="theme-btn" id="themeToggle">
                        <span class="theme-icon">☀️</span>
                        <span class="theme-text">Mode clair</span>
                    </button>
                    <button class="theme-btn" id="logoutBtn">
                        <span>🚪</span>
                        <span>Déconnexion</span>
                    </button>
                </div>
            </div>

            <div class="card">
                <h2>📊 État du Moteur</h2>
                <div class="led-display">
                    <div class="led" id="led"></div>
                    <div class="led-status" id="ledStatus">---</div>
                </div>
            </div>

            <div class="card">
                <h2>🎮 Commandes</h2>
                <div class="button-group">
                    <button class="btn btn-on" id="btnOn">
                        <span class="btn-icon">🟢</span>
                        <span>MARCHE</span>
                    </button>
                    <button class="btn btn-off" id="btnOff">
                        <span class="btn-icon">🔴</span>
                        <span>ARRÊT</span>
                    </button>
                </div>
            </div>

            <div class="info-panel">
                <div class="info-item">
                    <span class="info-label">Dernière commande</span>
                    <span class="info-value" id="lastCommand">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Statut connexion</span>
                    <span class="info-value" id="connectionStatus">OK</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Dernière mise à jour</span>
                    <span class="info-value" id="lastUpdate">-</span>
                </div>
            </div>

            <div class="card">
                <h2>📈 Historique (20 derniers états)</h2>
                <div class="chart-container">
                    <canvas id="commandChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>📜 Journal des commandes</h2>
                <div class="history-list" id="historyList">
                    <div style="text-align: center; padding: 20px;">Aucune commande</div>
                </div>
            </div>

            <footer>
                <p>🔌 Connecté à ThingSpeak | Projet IoT - ESP32</p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
